name: "Import existing resource in terraform"
description: "Import existing resource in terraform"
inputs:
  api_url:
    required: false
    description: "Full URL of the API service to use. Defaults to the production API endpoint https://api.clickhouse.cloud/v1"
    default: ""
  organization_id:
    required: true
    description: "The clickhouse organization ID"
  token_key:
    required: true
    description: "The clickhouse token key"
  token_secret:
    required: true
    description: "The clickhouse token secret"
  resource_type:
    required: true
    default: "service"
    description: "The type of resource to import. Supported values are 'service' and 'postgres_instance'"
  service_name:
    required: true
    description: "The name of the existing service to import"
  tf_release:
    required: true
    description: "The terraform cli version"
  cloud_provider:
    required: true
    description: "The Cloud provider to use for import"
  region:
    required: true
    description: "The Cloud region to use for import"
runs:
  using: "composite"
  steps:
    - name: Setup go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version-file: "go.mod"
        cache: true

    - name: Install terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      with:
        terraform_version: ${{ inputs.tf_release }}
        terraform_wrapper: false

    - shell: bash
      name: Show terraform version
      run: terraform version

    - shell: bash
      name: Set env variables
      run: |
        echo "::group::Setting env variables"

        cat <<EOF >tests/import/${{ inputs.resource_type }}/variables.tfvars
        organization_id = "${{ inputs.organization_id }}"
        token_key       = "${{ inputs.token_key }}"
        token_secret    = "${{ inputs.token_secret }}"
        cloud_provider  = "${{ inputs.cloud_provider }}"
        region          = "${{ inputs.region }}"
        EOF

        if [ "${{ inputs.resource_type }}" == "service" ] || [ "${{ inputs.resource_type }}" == "postgres_instance" ]
        then
          cat <<EOF >>tests/import/${{ inputs.resource_type }}/variables.tfvars
        service_name    = "${{ inputs.service_name }}"
        EOF
        fi

        echo "::endgroup::"

    - shell: bash
      name: Build provider from branch and create terraformrc to use it
      run: |
        git checkout ${{ github.ref }}
        echo "::group::Build provider from branch and create terraformrc to use it"
        go get
        BUILD_TAGS=()
        if [ "${{ inputs.resource_type }}" == "postgres_instance" ]; then
          BUILD_TAGS+=(-tags alpha)
        fi

        go build "${BUILD_TAGS[@]}" -o terraform-provider-clickhouse -ldflags='-X github.com/ClickHouse/terraform-provider-clickhouse/pkg/project.version=e2e -X github.com/ClickHouse/terraform-provider-clickhouse/pkg/project.commit=${{ github.sha }}'

        cat <<EOF >$HOME/.terraformrc
        provider_installation {
          dev_overrides {
            "ClickHouse/clickhouse" = "$(pwd)"
          }
          direct {}
        }
        EOF
        echo "::endgroup::"

    - shell: bash
      name: Create the resource
      id: apply
      run: |
        echo "::group::Create the resource"
        cd "tests/import/${{ inputs.resource_type }}"

        if [ "${{inputs.api_url}}" != "" ]
        then
          export CLICKHOUSE_API_URL="${{inputs.api_url}}"
          echo "Using '$CLICKHOUSE_API_URL' as API URL"
        fi

        if [[ "${ACTIONS_RUNNER_DEBUG:-}" == "true" ]] || [[ "${ACTIONS_STEP_DEBUG:-}" == "true" ]]; then
          export TF_LOG=debug
        fi

        terraform init -input=false -upgrade
        terraform apply -no-color -var-file=variables.tfvars -auto-approve

        id="$(jq -r '.resources[0].instances[0].attributes.id' terraform.tfstate)"
        echo "id=${id}" >> "$GITHUB_OUTPUT"

        if [ "${{ inputs.resource_type }}" == "postgres_instance" ]; then
          printf '%s' "${id}" > "${RUNNER_TEMP}/postgres_instance_import_id"
        fi

        # Ensure there is no state file
        rm terraform.tfstate

        echo "::endgroup::"

    - shell: bash
      name: Run terraform import
      run: |
        echo "::group::Run terraform"
        cd "tests/import/${{ inputs.resource_type }}"

        if [ "${{inputs.api_url}}" != "" ]
        then
          export CLICKHOUSE_API_URL="${{inputs.api_url}}"
          echo "Using '$CLICKHOUSE_API_URL' as API URL"
        fi

        if [[ "${ACTIONS_RUNNER_DEBUG:-}" == "true" ]] || [[ "${ACTIONS_STEP_DEBUG:-}" == "true" ]]; then
          export TF_LOG=debug
        fi

        terraform init -input=false -upgrade
        terraform import -no-color -var-file=variables.tfvars clickhouse_${{ inputs.resource_type }}.import ${{ steps.apply.outputs.id }}
        echo "::endgroup::"

    - shell: bash
      name: Verify imported state is clean
      run: |
        echo "::group::Verify imported state is clean"
        cd "tests/import/${{ inputs.resource_type }}"

        if [ "${{inputs.api_url}}" != "" ]
        then
          export CLICKHOUSE_API_URL="${{inputs.api_url}}"
          echo "Using '$CLICKHOUSE_API_URL' as API URL"
        fi

        if [[ "${ACTIONS_RUNNER_DEBUG:-}" == "true" ]] || [[ "${ACTIONS_STEP_DEBUG:-}" == "true" ]]; then
          export TF_LOG=debug
        fi

        set +e
        terraform plan -detailed-exitcode -no-color -var-file=variables.tfvars
        EXIT_CODE=$?
        set -e

        if [ "${EXIT_CODE}" -eq 1 ]; then
          exit 1
        fi

        if [ "${EXIT_CODE}" -eq 2 ]; then
          echo "Imported state does not match configuration."
          exit 1
        fi

        echo "::endgroup::"

    - shell: bash
      name: Terraform destroy
      if: ${{ always() }}
      env:
        RESOURCE_TYPE: ${{ inputs.resource_type }}
        API_URL: ${{inputs.api_url}}
      run: |
        ./.github/actions/import/import.sh

    - shell: bash
      name: Fallback Postgres cleanup
      if: ${{ always() && inputs.resource_type == 'postgres_instance' }}
      env:
        API_URL: ${{ inputs.api_url }}
        ORGANIZATION_ID: ${{ inputs.organization_id }}
        TOKEN_KEY: ${{ inputs.token_key }}
        TOKEN_SECRET: ${{ inputs.token_secret }}
      run: |
        ID_FILE="${RUNNER_TEMP}/postgres_instance_import_id"
        if [ ! -f "${ID_FILE}" ]; then
          exit 0
        fi

        POSTGRES_ID="$(cat "${ID_FILE}")"
        if [ -z "${POSTGRES_ID}" ]; then
          exit 0
        fi

        API_BASE="${API_URL:-https://api.clickhouse.cloud/v1}"
        curl -su "${TOKEN_KEY}:${TOKEN_SECRET}" \
          -XDELETE "${API_BASE}/organizations/${ORGANIZATION_ID}/postgres/${POSTGRES_ID}" \
          -o /dev/null || true
