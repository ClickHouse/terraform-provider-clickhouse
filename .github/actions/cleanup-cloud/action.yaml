name: Cleanup CSP leftovers
description: Cleanup any CSP leftovers of e2e test
inputs:
  cloud_provider:
    required: true
    description: The cloud provider name
  service_name:
    required: true
    description: The full name of the service for filtering purposes
  aws_role_arn:
    required: true
    description: The ARN of the AWS role to assume for cleanup
  aws_region:
    required: true
    description: The AWS region to use for cleanup
  azure_client_id:
    required: true
    description: The Azure client or application id to use for cleanup
  azure_tenant_id:
    required: true
    description: The Azure tenant id to use for cleanup
  azure_subscription_id:
    required: true
    description: The Azure subscription id to use for cleanup
  gcp_project:
    required: false
    default: ""
    description: The GCP project ID to use for GCP cleanup
  gcp_region:
    required: false
    default: ""
    description: The GCP region to use for GCP cleanup
  gcp_workload_identity_provider:
    required: false
    default: ""
    description: The GCP Workload Identity Federation provider resource name
  gcp_service_account:
    required: false
    default: ""
    description: The GCP service account email for Workload Identity Federation

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      if: inputs.cloud_provider == 'aws'
      id: aws-auth
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Cleanup AWS
      if: inputs.cloud_provider == 'aws'
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws_region }}
        SERVICE_NAME: ${{ inputs.service_name }}
      run: |
        ./.github/actions/cleanup-cloud/cleanup-aws.sh

    - name: Azure CLI Login
      if: inputs.cloud_provider == 'azure'
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Cleanup Azure
      if: inputs.cloud_provider == 'azure'
      shell: bash
      env:
        SERVICE_NAME: ${{ inputs.service_name }}
      run: |
        ./.github/actions/cleanup-cloud/cleanup-azure.sh

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v3
      if: inputs.cloud_provider == 'gcp' && inputs.gcp_workload_identity_provider != ''
      with:
        workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
        service_account: ${{ inputs.gcp_service_account }}

    - name: Set up gcloud CLI
      uses: google-github-actions/setup-gcloud@v2
      if: inputs.cloud_provider == 'gcp' && inputs.gcp_project != ''

    - name: Cleanup GCP
      if: inputs.cloud_provider == 'gcp' && inputs.gcp_project != ''
      shell: bash
      env:
        GCP_PROJECT: ${{ inputs.gcp_project }}
        GCP_REGION: ${{ inputs.gcp_region }}
        SERVICE_NAME: ${{ inputs.service_name }}
      run: |
        ./.github/actions/cleanup-cloud/cleanup-gcp.sh
