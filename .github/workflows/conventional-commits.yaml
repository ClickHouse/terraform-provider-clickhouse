name: Validate PR title is a Conventional Commit

# The repo squash-merges, so the PR title becomes the commit subject on main.
# This validates that title; the local .githooks/commit-msg hook keeps
# working-branch history clean.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

defaults:
  run:
    shell: bash

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: k8s-nano
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
