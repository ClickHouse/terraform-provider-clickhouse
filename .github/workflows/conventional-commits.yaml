name: Validate PR title is a Conventional Commit

# The repo squash-merges, so the PR title becomes the commit subject on main.
# This validates that title; the local .githooks/commit-msg hook keeps
# working-branch history clean.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

defaults:
  run:
    shell: bash

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: k8s-nano
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
