name: Ensure docs are up to date

on:
  pull_request: {}

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  check_docs:
    runs-on: k8s-small
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache: true

      # tfplugindocs shells out to the terraform binary on PATH to export the
      # provider schema. Write-only attributes (e.g. password_wo) only appear in
      # `terraform providers schema -json` on Terraform >= 1.11, so the docs only
      # render the [Write-only] annotation when a >= 1.11 binary is used. Pin one
      # here so CI matches local generation. terraform_wrapper must be false so
      # tfplugindocs can read the schema JSON from stdout.
      - name: Setup terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.11.4"
          terraform_wrapper: false

      - name: Generate docs
        run: make docs-alpha

      - name: Check for changes
        run: git diff --exit-code
