name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, please check the [documentation](https://registry.terraform.io/providers/ClickHouse/clickhouse/latest/docs) and [existing issues](https://github.com/ClickHouse/terraform-provider-clickhouse/issues).

  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Cloud provider
      options:
        - AWS
        - GCP
        - Azure
        - Not applicable
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Service tier
      description: Only relevant for `clickhouse_service` issues.
      options:
        - Production
        - Development
        - Not applicable
    validations:
      required: true

  - type: input
    attributes:
      label: Affected resource(s)
      description: Which Terraform resource(s) or data source(s) are involved?
      placeholder: "e.g. clickhouse_service, clickhouse_clickpipe"
    validations:
      required: false

  - type: input
    attributes:
      label: Provider version
      description: Output of `terraform providers` or the version in your `required_providers` block.
      placeholder: "e.g. 3.12.0"
    validations:
      required: true

  - type: input
    attributes:
      label: Terraform version
      description: Output of `terraform version`.
      placeholder: "e.g. 1.11.0"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Terraform configuration
      description: |
        The minimal Terraform configuration that reproduces the issue.
        Remove or redact any sensitive values (API keys, IPs, etc).
      render: hcl
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full error message or `terraform plan`/`apply` output if relevant.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Anything else that might help — logs, screenshots, links to related issues.
    validations:
      required: false
